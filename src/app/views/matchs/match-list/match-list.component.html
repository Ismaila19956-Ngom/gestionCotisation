<div class="match-list-container">
  <header class="page-header">
    <div class="header-content">
      <h1 class="title">Gestion des Matchs</h1>
      <button class="g-button primary" (click)="openAddMatchModal()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Ajouter un Match
      </button>
    </div>
  </header>

  <main class="content">
    <div class="matches-grid" *ngIf="!isLoading(); else loadingTpl">
      <div class="g-card match-card" *ngFor="let match of matches()" (click)="goToMatch(match.id)">
        <div class="card-icon">⚽</div>
        <div class="card-info">
          <h3 class="match-name">{{ match.nom_match }}</h3>
          <p class="match-date">{{ match.date_match | date:'dd MMMM yyyy' }}</p>
        </div>
        <div class="card-arrow">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
      </div>

      <div class="empty-state" *ngIf="matches().length === 0">
        <p>Aucun match enregistré pour le moment.</p>
        <button class="g-button outline" (click)="openAddMatchModal()">Créer votre premier match</button>
      </div>
    </div>

    <ng-template #loadingTpl>
      <div class="loading-container">
        <div class="spinner"></div>
        <p>Chargement des matchs...</p>
      </div>
    </ng-template>
  </main>

  <!-- Modal Ajouter un Match -->
  <div class="modal-backdrop" *ngIf="isAddModalOpen">
    <div class="modal-card">
      <div class="modal-header">
        <h5 class="fw-bold">Ajouter un nouveau match</h5>
        <button class="btn-close-modal" (click)="closeAddMatchModal()">&times;</button>
      </div>
      <div class="modal-body">
        <g-text-field 
          label="Nom du match" 
          placeholder="Ex: Finale Navétane, Match Amical..." 
          [(value)]="newMatchName"
        ></g-text-field>
      </div>
      <div class="modal-footer">
        <button class="btn btn-light" (click)="closeAddMatchModal()">Annuler</button>
        <button class="btn btn-primary" (click)="confirmAddMatch()">Créer le match</button>
      </div>
    </div>
  </div>
</div>
