<div class="cotisation-container">
    <div class="header-actions">
        <div class="period-selector">
            <select [(ngModel)]="selectedMonth" (change)="onPeriodChange()" class="natangue-select">
                <option *ngFor="let month of months" [value]="month.value">{{ month.label }}</option>
            </select>
            <select [(ngModel)]="selectedYear" (change)="onPeriodChange()" class="natangue-select ml-2">
                <option *ngFor="let year of years" [value]="year">{{ year }}</option>
            </select>
        </div>

        <div class="action-buttons">
            <ng-container *ngIf="isPeriodOpen(); else closedPeriodMessage">
                <button class="btn btn-primary btn-add" (click)="addCotisation()">
                    <span class="icon">+</span> Ajouter une Cotisation
                </button>
            </ng-container>
            <ng-template #closedPeriodMessage>
                <span class="badge-closed">Période clôturée</span>
            </ng-template>
        </div>
    </div>

    <div class="table-container">
        <table class="antigravity-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Membre</th>
                    <th>Catégorie</th>
                    <th>Montant Dû</th>
                    <th>Statut</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let record of membersData; let i = index">
                    <td>{{ i + 1 }}</td>
                    <td>{{ record.memberName }}</td>
                    <td>{{ record.category }}</td>
                    <td class="amount">{{ record.amountDue }} FCFA</td>
                    <td>
                        <ng-container *ngIf="getPaymentStatus(record.isPaid) as status">
                            <span class="status-badge" [ngClass]="status.cssClass">{{ status.label }}</span>
                        </ng-container>
                    </td>
                    <td class="actions">
                        <!-- Add cotisation button per member, only if period is open -->
                        <button class="btn btn-icon btn-pay" *ngIf="isPeriodOpen() && !record.isPaid"
                            title="Payer cotisation">
                            Payer
                        </button>
                        <button class="btn btn-icon btn-view" title="Voir historique">
                            👁️
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
