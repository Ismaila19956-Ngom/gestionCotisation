<div class="cotisation-container">
    <div class="header-actions">
        <div>
            <h2 style="margin: 0; color: #1b5e20;">Campagnes de Cotisation</h2>
            <p style="margin: 0.5rem 0 0 0; color: #555;">Gérez vos périodes de cotisations et le suivi par catégorie.
            </p>
        </div>
        <div class="action-buttons">
            <button class="btn btn-primary btn-add" (click)="openModal()">
                <span class="icon">+</span> Initialiser une Campagne
            </button>
        </div>
    </div>

    <div class="table-container">
        <table class="antigravity-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Libellé</th>
                    <th>Année</th>
                    <th>Période</th>
                    <th>Statut</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let camp of campagnes; let i = index">
                    <td>{{ i + 1 }}</td>
                    <td class="primary-text">{{ camp.libelle }}</td>
                    <td>{{ camp.annee }}</td>
                    <td>{{ getMoisLabel(camp.moisDebut) }} - {{ getMoisLabel(camp.moisFin) }}</td>
                    <td>
                        <span class="status-badge status-active" *ngIf="camp.statut === 'EN_COURS'">En cours</span>
                        <span class="status-badge" *ngIf="camp.statut !== 'EN_COURS'">{{ camp.statut }}</span>
                    </td>
                    <td class="actions" style="display: flex; gap: 8px;">
                        <button class="btn btn-icon btn-view" (click)="goToSuivi(camp.id)" title="Suivi de la campagne">
                            👁️ Suivi
                        </button>
                        <button class="btn btn-icon" (click)="deleteCampagne(camp.id)" title="Supprimer la campagne" style="background-color: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; font-weight: 600;">
                            🗑️ Supprimer
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Ajout -->
<div class="modal-backdrop" *ngIf="isModalOpen">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Nouvelle Campagne</h3>
            <button class="close-btn" (click)="closeModal()">×</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Libellé (ex: Cotisation Annuelle)</label>
                <input type="text" [(ngModel)]="nouvelleCampagne.libelle" class="form-control">
            </div>
            <div class="form-group">
                <label>Année</label>
                <select [(ngModel)]="nouvelleCampagne.annee" class="form-control">
                    <option *ngFor="let a of annees" [value]="a">{{ a }}</option>
                </select>
            </div>
            <div class="form-group">
                <label>Date début cotisations</label>
                <input type="date" [(ngModel)]="nouvelleCampagne.dateDebutCotisation" name="dateDebutCotisation" class="form-control">
            </div>

            <div class="form-group">
                <label>Date fin cotisations</label>
                <input type="date" [(ngModel)]="nouvelleCampagne.dateFinCotisation" name="dateFinCotisation" class="form-control">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" (click)="closeModal()">Annuler</button>
            <button class="btn btn-primary" (click)="saveCampagne()">Sauvegarder</button>
        </div>
    </div>
</div>
