<aside class="sidebar" [class.open]="menuService.isSidebarOpen()">
    <!-- Logo / Brand -->
    <div class="sidebar-header">
        <div class="sidebar-brand">
            <div class="brand-logo">
                <span class="brand-icon">⚽</span>
                <div class="brand-text">
                    <span class="brand-name">ASC</span>
                    <span class="brand-sub">NATANGUÉ</span>
                </div>
            </div>
        </div>
        <button class="btn-close-sidebar" (click)="menuService.closeSidebar()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>

    <!-- Navigation -->
    <div class="sidebar-body">
        <div class="nav-section-label">Navigation</div>
        <ul class="sidebar-nav">
            @for (item of menuItems(); track item.route) {
            <li class="nav-item">
                <a [routerLink]="item.route" routerLinkActive="active" class="nav-link"
                    (click)="menuService.closeSidebar()">
                    <span class="nav-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            @switch (item.icon) {
                            @case ('grid') {
                            <rect x="3" y="3" width="7" height="7" />
                            <rect x="14" y="3" width="7" height="7" />
                            <rect x="14" y="14" width="7" height="7" />
                            <rect x="3" y="14" width="7" height="7" />
                            }
                            @case ('users') {
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                            <circle cx="9" cy="7" r="4" />
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                            }
                            @case ('credit-card') {
                            <rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
                            <line x1="1" y1="10" x2="23" y2="10" />
                            }
                            @case ('image') {
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                            <circle cx="8.5" cy="8.5" r="1.5" />
                            <polyline points="21 15 16 10 5 21" />
                            }
                            @case ('settings') {
                            <circle cx="12" cy="12" r="3" />
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                            }
                            }
                        </svg>
                    </span>
                    <span class="nav-label">{{ item.label }}</span>
                </a>
            </li>
            }
        </ul>

        <!-- Footer sidebar -->
        <div class="sidebar-footer">
            <div class="app-version">ASC Natangué &copy; {{ currentYear }}</div>
        </div>
    </div>
</aside>
